name: Auth0 Checkmate

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  checkmate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Auth0 Checkmate
        run: |
          npm install -g @auth0/auth0-checkmate

      - name: Run Checkmate
        env:
          AUTH0CHECKMATE_DOMAIN: ${{ secrets.AUTH0_DOMAIN }}
          AUTH0CHECKMATE_CLIENT_ID: ${{ secrets.AUTH0_M2M_CLIENT_ID }}
          AUTH0CHECKMATE_CLIENT_SECRET: ${{ secrets.AUTH0_M2M_CLIENT_SECRET }}
          AUTH0CHECKMATE_DISABLE_PDF_REPORTING: "true"
          AUTH0CHECKMATE_SHOW_VALIDATORS: "false"
          AUTH0CHECKMATE_FILE_PATH: "./reports"
        run: |
          printf "./reports\n" | a0checkmate --output json 2>&1 | tee findings.json
          exit ${PIPESTATUS[0]}

      - name: Commit report to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/
          git diff --staged --quiet || git commit -m "chore: add Auth0 Checkmate report $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          git push
